# Copy these keys into Streamlit Cloud Advanced settings or your local
# .streamlit/secrets.toml file. Do not commit real secret values.

GEMINI_API_KEY = "replace-with-your-gemini-key"
# GOOGLE_API_KEY = "optional-fallback-key"

# Optional map fallbacks. Public OpenStreetMap/Photon/Overpass search works without these.
# HERE_API_KEY = "optional-here-api-key"
# MAPBOX_ACCESS_TOKEN = "optional-mapbox-access-token"

# Required MySQL storage for users, doctor appointments, and lab appointments.
MYSQL_HOST = "localhost"
MYSQL_PORT = 3306
MYSQL_DATABASE = "disease_prediction"
MYSQL_USER = "root"
MYSQL_PASSWORD = "replace-with-your-mysql-password"

# Optional appointment email confirmations. For Gmail, use an app password.
SMTP_HOST = "smtp.gmail.com"
SMTP_PORT = 587
SMTP_USER = "your-email@gmail.com"
SMTP_PASSWORD = "replace-with-your-email-app-password"
SMTP_FROM_EMAIL = "your-email@gmail.com"
SMTP_FROM_NAME = "Disease Prediction System"
SMTP_USE_TLS = true
